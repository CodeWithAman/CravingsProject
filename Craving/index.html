<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cravings</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar navbar-cravings d-flex align-items-center justify-content-between sticky-top">
        <div class="container-fluid px-4">

            <a class="navbar-brand" href="index.html">
                <img src="images/logo-light.png" alt="Cravings" class="navbar-logo" />
            </a>

            <div class="d-flex align-items-center gap-2 nav-links">
                <a href="login.html" class="navbar-login-link">Login</a>
                <a href="register.html" class="btn-register-pill">Register</a>
            </div>

        </div>
    </nav>

    <section class="hero-section">
        <div class="hero-overlay"></div>
        <div class="hero-content mb-4">
            <h1 class="mb-3">Your Favorite Food,<br>Delivered Fast</h1>
            <p class="hero-sub mb-4">Order from thousands of restaurants and get it delivered to your doorstep</p>
            <div class="d-flex gap-3 justify-content-center flex-wrap mb-4">
                <a href="register.html" class="btn-hero-primary">Sign Up</a>
                <a href="order-now.html" class="btn-hero-secondary">Order Now</a>
            </div>
            <div class="hero-search">
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-search text-muted-brand"></i></span>
                    <input type="text" class="form-control" placeholder="Search restaurants or dishes..." />
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
